[build]
  # The command Netlify will run to compile your CSS
  command = "npm run build"
  
  # The directory Netlify will serve to the public
  publish = "webapp"

# 🚨 SECURITY: Prevent Search Engines from indexing the Admin Studio
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Performance: Cache static assets (JS, CSS) for 1 year
[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fallback routing for SPA (If you add actual routing later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  # Do not force this on /admin.html so it remains directly accessible