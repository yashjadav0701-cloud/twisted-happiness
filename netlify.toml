[build]
  command = "npm install && npm run build"
  publish = "."

# 🚨 SECURITY: Prevent Search Engines from indexing the Admin Studio
[[headers]]
  for = "/admin*.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Performance: Cache static assets (JS, CSS) for 1 year
[[headers]]
  for = "/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Admin redirect route
[[redirects]]
  from = "/khushiified"
  to = "/admin_2.html"
  status = 200

# Fallback routing for the main site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200