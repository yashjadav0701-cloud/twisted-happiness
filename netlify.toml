[build]
  publish = "webapp"

# ==========================================
# SECURITY: Prevent search engines from indexing Admin Studio
# ==========================================

[[headers]]
  for = "/admin*.html"

  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# ==========================================
# PERFORMANCE: Cache static assets
# ==========================================

[[headers]]
  for = "/**/*.css"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/**/*.js"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ==========================================
# ADMIN ROUTE
# ==========================================

[[redirects]]
  from = "/khushiified"
  to = "/admin.html"
  status = 200

# ==========================================
# MAIN WEBSITE FALLBACK
# ==========================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200