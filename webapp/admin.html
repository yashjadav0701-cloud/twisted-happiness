<!DOCTYPE html>
<html lang="en" class="scroll-smooth antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Twisted Happiness | Studio Admin</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="./output.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Bitter:wght@400;600&family=Poppins:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Deferred Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="./js/admin.js" defer></script>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; } 
        .custom-scroll::-webkit-scrollbar-track { background: transparent; } 
        .custom-scroll::-webkit-scrollbar-thumb { background-color: theme('colors.luxury.rose'); border-radius: 20px; }
    </style>
</head>
<body class="bg-luxury-bg text-luxury-dark font-sans selection:bg-luxury-blush min-h-screen flex flex-col items-center">

    <!-- LOGIN GATE -->
    <main id="login-view" class="flex-grow flex items-center justify-center w-full p-4 transition-opacity duration-300">
        <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl w-full max-w-xs text-center border border-luxury-blush">
            <i class="fas fa-lock text-luxury-rose text-3xl mb-4 block"></i>
            <span class="block text-center text-[8px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-1">Restricted Access</span>
            <h1 class="font-logo font-normal text-2xl mb-6 text-luxury-dark">Admin Studio</h1>
            
            <form id="admin-login-form" class="flex flex-col gap-4">
                <input type="email" id="admin-user" required autocomplete="email" placeholder="Admin Email" class="w-full text-center text-[13px] font-medium bg-luxury-bg px-4 py-3 rounded-xl border border-luxury-blush outline-none text-luxury-dark focus:ring-2 focus:ring-luxury-rose/30 focus:border-luxury-rose">
                <input type="password" id="admin-pass" required autocomplete="current-password" placeholder="Password" class="w-full text-center text-[13px] font-medium bg-luxury-bg px-4 py-3 rounded-xl border border-luxury-blush outline-none text-luxury-dark focus:ring-2 focus:ring-luxury-rose/30 focus:border-luxury-rose">
                
                <div class="flex flex-col gap-2.5 mt-2">
                    <button type="submit" id="login-btn" class="bg-luxury-dark text-white hover:bg-luxury-gold transition-colors w-full rounded-full py-3 font-bold text-[9px] uppercase tracking-[0.2em] shadow-md">Enter Studio</button>
                    <a href="/" class="w-full py-2 text-gray-400 hover:text-luxury-rose transition-colors font-bold text-[8px] uppercase tracking-[0.1em]">Return to Store</a>
                </div>
            </form>
        </div>
    </main>

    <!-- SECURE ADMIN DASHBOARD -->
    <div id="admin-dashboard" class="hidden w-full max-w-[1200px] mx-auto p-4 sm:p-6 opacity-0 transition-opacity duration-500">
        
        <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 sm:p-5 shadow-sm mb-6 border border-luxury-blush rounded-2xl gap-3">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/0RRrFK9N/TH-logo-1.png" class="w-10 h-10 rounded-full object-cover border-2 border-luxury-rose" alt="Logo">
                <h1 class="font-logo font-normal text-xl text-luxury-dark">Twisted Happiness <span class="text-gray-400 font-sans font-bold text-[8px] uppercase tracking-[0.2em] ml-1">Studio</span></h1>
            </div>
            <nav class="flex gap-2">
                <button type="button" id="tab-inventory" class="text-white bg-luxury-dark font-bold text-[9px] uppercase tracking-[0.1em] px-4 py-2.5 rounded-full border border-luxury-dark shadow-sm transition-colors">Inventory</button>
                <button type="button" id="tab-orders" class="text-gray-500 bg-luxury-bg hover:text-luxury-dark font-bold text-[9px] uppercase tracking-[0.1em] px-4 py-2.5 rounded-full border border-luxury-blush shadow-sm relative transition-colors">
                    Orders <span id="admin-order-badge" class="absolute -top-1 -right-1 bg-luxury-rose text-white w-4 h-4 flex items-center justify-center rounded-full text-[7px] hidden">0</span>
                </button>
                <button type="button" id="btn-logout" class="text-gray-500 bg-white hover:text-red-500 font-bold text-[9px] uppercase tracking-[0.1em] px-4 py-2.5 rounded-full border border-luxury-blush shadow-sm transition-colors"><i class="fas fa-sign-out-alt"></i></button>
            </nav>
        </header>

        <section id="admin-inventory-section" class="grid lg:grid-cols-12 gap-6 w-full">
            <div class="lg:col-span-8 bg-white p-5 sm:p-8 shadow-sm border border-luxury-blush rounded-2xl h-fit">
                <div class="flex justify-between items-center mb-5 border-b border-luxury-blush pb-3">
                    <h2 id="form-title" class="font-logo font-normal text-xl text-luxury-dark">Add New Art Piece</h2>
                    <button type="button" id="cancel-edit-btn" class="hidden text-[9px] bg-luxury-bg text-gray-500 px-3 py-1.5 rounded-full font-bold border border-luxury-blush uppercase tracking-[0.1em] hover:bg-luxury-rose hover:text-white transition-colors">Cancel Edit</button>
                </div>

                <form id="inventory-form" class="space-y-4">
                    <div>
                        <label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Main Category</label>
                        <select id="p-main-category" required class="w-full bg-luxury-bg border border-luxury-blush rounded-xl px-4 py-3 text-[12px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30">
                            <option value="Pipe Cleaner Crafts">Pipe Cleaner Crafts</option>
                            <option value="Canvas Paintings">Canvas Paintings</option>
                            <option value="Clay Art Paintings">Clay Art Paintings</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Product Name</label><input type="text" id="p-name" required class="w-full bg-luxury-bg border border-luxury-blush rounded-xl px-4 py-3 text-[12px] font-medium font-bitter outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Sub-Category</label><input type="text" id="p-category" list="category-list" class="w-full bg-luxury-bg border border-luxury-blush rounded-xl px-4 py-3 text-[12px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"><datalist id="category-list"></datalist></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Selling Price (₹)</label><input type="number" id="p-price" required min="1" class="w-full bg-luxury-bg border border-luxury-blush rounded-xl px-4 py-3 text-[12px] font-medium font-poppins outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Prep Time (Days)</label><input type="text" id="p-prep" required class="w-full bg-luxury-bg border border-luxury-blush rounded-xl px-4 py-3 text-[12px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30" placeholder="e.g. 3-5"></div>
                    </div>
                    <div id="painting-fields-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden p-4 bg-gradient-to-r from-luxury-blush/50 to-transparent border border-luxury-blush rounded-xl">
                        <div><label class="block font-bold mb-1.5 text-luxury-rose text-[9px] uppercase tracking-[0.1em]">Dimensions</label><input type="text" id="p-dimensions" class="w-full bg-white border border-luxury-blush rounded-lg px-4 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div class="flex items-center mt-6"><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="p-customizable" class="w-4 h-4 accent-luxury-rose rounded border-gray-300 focus:ring-luxury-rose"><span class="text-[11px] font-bold text-luxury-dark">Allow Custom Sizes</span></label></div>
                    </div>
                    <div>
                        <label class="block font-bold mb-2 text-luxury-dark text-[9px] uppercase tracking-[0.1em]">Imagery (Max 5)</label>
                        <div class="relative border-2 border-dashed border-luxury-blush p-5 text-center rounded-xl bg-luxury-bg hover:border-luxury-rose transition-colors group cursor-pointer overflow-hidden">
                            <i class="fas fa-cloud-upload-alt text-2xl text-luxury-rose mb-2 opacity-70 group-hover:opacity-100 transition-all"></i>
                            <p class="text-[10px] text-gray-400 font-medium group-hover:text-luxury-dark">Tap here to upload imagery to Cloud.</p>
                            <input type="file" id="p-image-file" accept="image/*" multiple max="5" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        </div>
                        <div id="image-preview-container" class="mt-4 grid grid-cols-3 sm:grid-cols-5 gap-3 hidden"></div>
                        <p id="image-help-text" class="text-luxury-rose text-[9px] mt-2 font-bold hidden tracking-widest uppercase">Tap an image to set as cover.</p>
                    </div>
                    <div><label class="block font-bold mb-1.5 text-gray-400 text-[9px] uppercase tracking-[0.1em]">Product Details</label><textarea id="p-specs" required class="w-full bg-luxury-bg border border-luxury-blush rounded-xl p-4 h-28 text-[12px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30 resize-none"></textarea></div>
                    <button type="submit" id="btn-save-product" class="bg-luxury-dark text-white hover:bg-luxury-gold w-full py-3.5 rounded-full font-bold text-[10px] uppercase tracking-[0.1em] shadow-md transition-colors mt-2">Publish to Collection</button>
                </form>
            </div>

            <aside class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white p-5 shadow-sm border border-luxury-blush rounded-2xl">
                    <h3 class="font-bold text-[10px] text-luxury-dark uppercase tracking-[0.1em] mb-4 flex items-center gap-2"><i class="fas fa-cog text-luxury-rose"></i> Global Settings</h3>
                    <form id="settings-form" class="space-y-4">
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[8px] uppercase tracking-[0.1em]">Store Name</label><input type="text" id="admin-store-name" required class="w-full bg-luxury-bg border border-luxury-blush rounded-lg px-3 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[8px] uppercase tracking-[0.1em]">Instagram URL</label><input type="url" id="admin-ig" placeholder="https://instagram.com/..." class="w-full bg-luxury-bg border border-luxury-blush rounded-lg px-3 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[8px] uppercase tracking-[0.1em]">Default Country Code</label><select id="admin-country-code" class="w-full bg-luxury-bg border border-luxury-blush rounded-lg px-3 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30 cursor-pointer"></select></div>
                        <div><label class="block font-bold mb-1.5 text-gray-400 text-[8px] uppercase tracking-[0.1em]">WhatsApp Number</label><input type="text" id="admin-wa" required class="w-full bg-luxury-bg border border-luxury-blush rounded-lg px-3 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <div class="border-t border-luxury-blush pt-4"><label class="block font-bold mb-1.5 text-gray-400 text-[8px] uppercase tracking-[0.1em]">UPI ID (For Payments)</label><input type="text" id="admin-upi-id" required placeholder="e.g. khushisj315@oksbi" class="w-full bg-luxury-bg border border-luxury-blush rounded-lg px-3 py-2.5 text-[11px] font-medium outline-none focus:ring-2 focus:ring-luxury-rose/30"></div>
                        <button type="submit" class="border border-luxury-rose text-luxury-dark hover:bg-luxury-rose hover:text-white w-full py-2.5 rounded-full font-bold text-[9px] uppercase tracking-[0.1em] transition-colors shadow-sm mt-2">Save Settings</button>
                    </form>
                </div>
                <div class="bg-white p-5 shadow-sm border border-luxury-blush rounded-2xl flex flex-col h-[400px]">
                    <h3 class="font-bold text-[10px] text-luxury-dark uppercase tracking-[0.1em] border-b border-luxury-blush pb-3 mb-3 flex items-center gap-2"><i class="fas fa-layer-group text-luxury-rose"></i> Master Inventory</h3>
                    <div id="admin-product-list" class="flex flex-col gap-0 overflow-y-auto pr-1 flex-grow divide-y divide-luxury-blush custom-scroll"></div>
                </div>
            </aside>
        </section>

        <!-- Orders Management Section -->
        <section id="admin-orders-section" class="w-full hidden">
            <div class="max-w-4xl mx-auto mt-4 mb-6 flex justify-center gap-3">
                <button type="button" id="subtab-active" class="text-white bg-luxury-dark font-bold text-[9px] uppercase tracking-[0.1em] px-6 py-3 rounded-full border border-luxury-dark transition-colors shadow-sm">Active Commissions</button>
                <button type="button" id="subtab-completed" class="text-gray-500 bg-luxury-bg hover:text-luxury-dark font-bold text-[9px] uppercase tracking-[0.1em] px-6 py-3 rounded-full border border-luxury-blush transition-colors shadow-sm">The Archives</button>
            </div>
            <div class="max-w-4xl mx-auto bg-white p-5 sm:p-8 shadow-sm border border-luxury-blush rounded-2xl h-fit">
                <h2 id="order-section-title" class="font-logo font-normal text-2xl text-luxury-dark border-b border-luxury-blush pb-3 mb-5">Concierge Desk: Active Workspace</h2>
                <div id="admin-active-orders" class="flex flex-col gap-4">
                    <div class="text-center text-gray-400 py-10 text-[10px] uppercase tracking-[0.2em] font-medium"><i class="fas fa-spinner fa-spin mr-2"></i> Loading Desk...</div>
                </div>
                <div id="admin-completed-orders" class="flex flex-col gap-4 hidden"></div>
            </div>
        </section>
    </div>

    <!-- Global Toast Notification -->
    <div id="toast" role="alert" aria-live="assertive" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-luxury-dark text-luxury-bg px-6 py-3 rounded-full shadow-xl flex items-center gap-2.5 transition-all duration-300 opacity-0 pointer-events-none w-max border border-luxury-rose/30 translate-y-10 z-[2000]">
        <i id="toast-icon" class="fas fa-check text-luxury-rose text-sm"></i> 
        <span id="toast-msg" class="text-[10px] font-bold tracking-[0.1em] uppercase pt-0.5"></span>
    </div>
</body>
</html>
